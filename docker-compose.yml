# docker-compose.yml
#
# Quick start:
#   1. Copy .env.example to .env and fill in your API keys
#   2. Run: docker compose up -d
#   3. The app will be available at http://<your-host>:3000
#
# The database is stored in a named Docker volume (datenight-data).
# To find where Docker stores it on disk: docker volume inspect datenight-data
# To back it up: docker run --rm -v datenight-data:/data -v $(pwd):/out alpine tar czf /out/datenight-backup.tar.gz /data

services:
  datenight:
    build:
      context: .
      args:
        - NEXT_PUBLIC_SEERR_URL=${NEXT_PUBLIC_SEERR_URL:-}
    container_name: datenight
    image: datenight:latest
    mem_limit: 512m
    memswap_limit: 512m
    cpus: "1.0"
    ports:
      - "8765:3000"
    volumes:
      - datenight-data:/app/data
    environment:
      - DATABASE_URL=file:/app/data/datenight.db
      - TMDB_API_KEY=${TMDB_API_KEY}
      - SEERR_URL=${SEERR_URL}
      - SEERR_API_KEY=${SEERR_API_KEY}
      - SEERR_CONCURRENCY=${SEERR_CONCURRENCY:-}
      - PLEX_URL=${PLEX_URL}
      - PLEX_TOKEN=${PLEX_TOKEN}
      - USER1_NAME=${USER1_NAME:-User 1}
      - USER2_NAME=${USER2_NAME:-User 2}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  datenight-data:

networks:
  proxy:
    external: true
